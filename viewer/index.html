<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forge3D Viewer — 10 Assets</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh}
#header{padding:10px 18px;background:#1a1a2e;border-bottom:1px solid #333;display:flex;align-items:center;gap:16px}
#header h1{font-size:16px;font-weight:700;color:#8be9fd}
#asset-list{display:flex;gap:6px;flex-wrap:wrap}
.asset-btn{padding:4px 10px;border-radius:4px;border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-size:12px;transition:.15s}
.asset-btn.active,.asset-btn:hover{background:#3d3d7a;border-color:#8be9fd;color:#fff}
#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:220px;background:#161625;padding:12px;overflow-y:auto;font-size:12px;border-right:1px solid #2a2a3a}
#sidebar h2{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #222}
.info-key{color:#888}
.info-val{color:#50fa7b;font-weight:600}
#canvas-wrap{flex:1;position:relative}
canvas{width:100%;height:100%;display:block}
#overlay{position:absolute;top:10px;right:12px;font-size:11px;color:#666;pointer-events:none}
#loading{position:absolute;inset:0;background:#111;display:flex;align-items:center;justify-content:center;font-size:15px;color:#888}
</style>
</head>
<body>
<div id="header">
  <h1>⬡ Forge3D Viewer</h1>
  <div id="asset-list"></div>
</div>
<div id="main">
  <div id="sidebar">
    <h2>Asset Info</h2>
    <div id="info"></div>
    <br>
    <h2>Controls</h2>
    <div style="color:#666;font-size:11px;line-height:1.7">Drag — orbit<br>Scroll — zoom<br>Right drag — pan</div>
  </div>
  <div id="canvas-wrap">
    <div id="loading">Loading Three.js…</div>
    <div id="overlay">Forge3D v0.1.0</div>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"./vendor/three.module.min.js","three/addons/":"./vendor/addons/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

const ASSETS = [
  {name:"01 Crate",file:"../out/01_wooden_crate.glb"},
  {name:"02 Coin",file:"../out/02_gold_coin.glb"},
  {name:"03 Mug",file:"../out/03_ceramic_mug.glb"},
  {name:"04 Lamp",file:"../out/04_desk_lamp.glb"},
  {name:"05 Sword",file:"../out/05_sword.glb"},
  {name:"06 Watch",file:"../out/06_wristwatch.glb"},
  {name:"07 Car",file:"../out/07_stylized_car.glb"},
  {name:"08 Spaceship",file:"../out/08_spaceship.glb"},
  {name:"09 Trophy",file:"../out/09_trophy.glb"},
  {name:"10 Scene",file:"../out/10_full_scene.glb"},
];

const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
const camera = new THREE.PerspectiveCamera(45,1,0.001,100);
camera.position.set(0,0.5,2);
const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,0.6));
const key=new THREE.DirectionalLight(0xfff8f0,2.0); key.position.set(-1.5,3,2); scene.add(key);
const fill=new THREE.DirectionalLight(0xd0e8ff,0.8); fill.position.set(2,1,-1); scene.add(fill);

new RGBELoader().load('../assets/hdri/studio.hdr',
  t=>{t.mapping=THREE.EquirectangularReflectionMapping;scene.environment=t;},
  undefined, ()=>console.warn('HDRI fallback: lights only'));

const assetList=document.getElementById('asset-list');
let current=null;
ASSETS.forEach((a,i)=>{
  const btn=document.createElement('button');
  btn.className='asset-btn'; btn.textContent=a.name;
  btn.onclick=()=>loadAsset(a,btn);
  assetList.appendChild(btn);
  if(i===0) btn.click();
});

const loader=new GLTFLoader();
function loadAsset(a,btn){
  document.querySelectorAll('.asset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ld=document.getElementById('loading');
  ld.style.display='flex'; ld.textContent='Loading…';
  if(current){scene.remove(current);current=null;}
  loader.load(a.file,gltf=>{
    current=gltf.scene;
    const box=new THREE.Box3().setFromObject(current);
    const sz=box.getSize(new THREE.Vector3()).length();
    current.position.sub(box.getCenter(new THREE.Vector3()));
    camera.position.set(0,sz*0.3,sz*1.5); controls.target.set(0,0,0); controls.update();
    scene.add(current);
    let mc=0,tc=0,ms=new Set();
    current.traverse(o=>{
      if(o.isMesh){
        mc++;
        tc+=(o.geometry.index?o.geometry.index.count:o.geometry.attributes.position.count)/3|0;
        (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>ms.add(m.uuid));
      }
    });
    document.getElementById('info').innerHTML=
      `<div class="info-row"><span class="info-key">Asset</span><span class="info-val">${a.name}</span></div>`+
      `<div class="info-row"><span class="info-key">Meshes</span><span class="info-val">${mc}</span></div>`+
      `<div class="info-row"><span class="info-key">Triangles</span><span class="info-val">${tc.toLocaleString()}</span></div>`+
      `<div class="info-row"><span class="info-key">Materials</span><span class="info-val">${ms.size}</span></div>`;
    ld.style.display='none';
  },undefined,e=>{ld.textContent='Error: '+e.message;});
}

function resize(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();
(function loop(){requestAnimationFrame(loop);controls.update();renderer.render(scene,camera);})();
</script>
</body></html>
